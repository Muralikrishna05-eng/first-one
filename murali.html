<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messaging App Login UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f0f2f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-container{
    width:350px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
    text-align:center;
}

.logo{
    width:80px;
    height:80px;
    background:#25D366;
    border-radius:50%;
    margin:0 auto 15px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:36px;
    font-weight:bold;
}

h2{
    margin-bottom:10px;
    color:#111;
}

p{
    color:#666;
    font-size:14px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#25D366;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1ebc59;
}
</style>
</head>
<body>

<div class="login-container">
    <div class="logo">💬</div>

    <h2>Welcome</h2>
    <p>Enter your phone number to continue</p>

    <form>
        <input type="tel" placeholder="+91 Enter phone number" required>
        <button type="submit">Next</button>
    </form>
</div>

</body>
</html>
